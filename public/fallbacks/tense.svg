<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 288">
  <defs>
    <radialGradient id="bg" cx="68%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3a0808"/>
      <stop offset="100%" stop-color="#040101"/>
    </radialGradient>
    <radialGradient id="door" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff7733" stop-opacity="1"/>
      <stop offset="55%" stop-color="#aa3300" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="45%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.88"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence baseFrequency="0.72" numOctaves="3" stitchTiles="stitch"/>
    </filter>
  </defs>
  <rect width="512" height="288" fill="url(#bg)"/>
  <!-- floor -->
  <rect x="0" y="215" width="512" height="73" fill="#020000"/>
  <!-- door backlight -->
  <rect x="318" y="68" width="64" height="148" fill="url(#door)"/>
  <!-- door frame outline -->
  <rect x="316" y="66" width="68" height="152" fill="none" stroke="#ff6622" stroke-width="1" stroke-opacity="0.3"/>
  <!-- figure head -->
  <ellipse cx="172" cy="108" rx="13" ry="15" fill="#030000"/>
  <!-- figure body -->
  <path d="M159 123 L157 215 L187 215 L185 123 Z" fill="#030000"/>
  <!-- arm reaching -->
  <line x1="159" y1="143" x2="133" y2="168" stroke="#030000" stroke-width="8" stroke-linecap="round"/>
  <line x1="185" y1="143" x2="206" y2="162" stroke="#030000" stroke-width="7" stroke-linecap="round"/>
  <!-- legs -->
  <line x1="165" y1="215" x2="157" y2="265" stroke="#030000" stroke-width="10" stroke-linecap="round"/>
  <line x1="179" y1="215" x2="187" y2="265" stroke="#030000" stroke-width="10" stroke-linecap="round"/>
  <!-- floor shadow -->
  <ellipse cx="175" cy="262" rx="52" ry="7" fill="#0a0000" fill-opacity="0.55"/>
  <!-- dust motes in backlight -->
  <circle cx="305" cy="115" r="1.5" fill="#ff8844" fill-opacity="0.35"/>
  <circle cx="315" cy="145" r="1" fill="#ff8844" fill-opacity="0.25"/>
  <circle cx="295" cy="130" r="1" fill="#ff8844" fill-opacity="0.2"/>
  <circle cx="310" cy="100" r="1.2" fill="#ff8844" fill-opacity="0.3"/>
  <!-- vignette -->
  <rect width="512" height="288" fill="url(#vig)"/>
  <!-- grain -->
  <rect width="512" height="288" filter="url(#grain)" opacity="0.04"/>
  <!-- letterbox -->
  <rect width="512" height="20" fill="#000"/>
  <rect y="268" width="512" height="20" fill="#000"/>
  <!-- corner markers -->
  <g stroke="#fff" stroke-width="1" stroke-opacity="0.22" fill="none">
    <path d="M26 28 L26 21 L19 21"/>
    <path d="M486 28 L486 21 L493 21"/>
    <path d="M26 260 L26 267 L19 267"/>
    <path d="M486 260 L486 267 L493 267"/>
  </g>
</svg>
