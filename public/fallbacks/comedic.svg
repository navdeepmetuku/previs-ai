<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 288">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="100%" stop-color="#102038"/>
    </linearGradient>
    <radialGradient id="light" cx="50%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#fff8e0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fff8e0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="45%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.7"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="512" height="288" fill="url(#sky)"/>
  <!-- stage spotlight -->
  <polygon points="206,0 306,0 340,288 172,288" fill="url(#light)" filter="url(#glow)"/>
  <!-- stage floor -->
  <rect x="0" y="215" width="512" height="73" fill="#060c18"/>
  <!-- floor boards -->
  <line x1="0" y1="230" x2="512" y2="230" stroke="#0a1428" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="0" y1="246" x2="512" y2="246" stroke="#0a1428" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="0" y1="262" x2="512" y2="262" stroke="#0a1428" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- comedic figure in spotlight (exaggerated pose) -->
  <!-- big round head -->
  <ellipse cx="256" cy="118" rx="26" ry="28" fill="#080e1a"/>
  <!-- body -->
  <ellipse cx="256" cy="180" rx="22" ry="34" fill="#080e1a"/>
  <!-- one arm up waving -->
  <line x1="234" y1="162" x2="198" y2="128" stroke="#080e1a" stroke-width="10" stroke-linecap="round"/>
  <circle cx="194" cy="124" r="8" fill="#080e1a"/>
  <!-- other arm out -->
  <line x1="278" y1="168" x2="316" y2="178" stroke="#080e1a" stroke-width="10" stroke-linecap="round"/>
  <!-- legs splayed -->
  <line x1="244" y1="215" x2="224" y2="262" stroke="#080e1a" stroke-width="12" stroke-linecap="round"/>
  <line x1="268" y1="215" x2="292" y2="260" stroke="#080e1a" stroke-width="12" stroke-linecap="round"/>
  <!-- small hat on head -->
  <ellipse cx="256" cy="93" rx="20" ry="5" fill="#080e1a"/>
  <rect x="244" y="80" width="24" height="14" fill="#080e1a"/>
  <!-- vignette -->
  <rect width="512" height="288" fill="url(#vig)"/>
  <!-- letterbox -->
  <rect width="512" height="20" fill="#000"/>
  <rect y="268" width="512" height="20" fill="#000"/>
  <!-- corner markers -->
  <g stroke="#fff" stroke-width="1" stroke-opacity="0.22" fill="none">
    <path d="M26 28 L26 21 L19 21"/>
    <path d="M486 28 L486 21 L493 21"/>
    <path d="M26 260 L26 267 L19 267"/>
    <path d="M486 260 L486 267 L493 267"/>
  </g>
</svg>
