<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 288">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0800"/>
      <stop offset="60%" stop-color="#2a1800"/>
      <stop offset="100%" stop-color="#180e00"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="75%" r="55%">
      <stop offset="0%" stop-color="#ffcc44" stop-opacity="0.8"/>
      <stop offset="35%" stop-color="#ff8800" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>
  <rect width="512" height="288" fill="url(#sky)"/>
  <!-- sun burst -->
  <circle cx="256" cy="215" r="120" fill="#ffaa22" fill-opacity="0.2" filter="url(#glow)"/>
  <rect width="512" height="288" fill="url(#sun)"/>
  <!-- horizon -->
  <rect x="0" y="215" width="512" height="1" fill="#cc8822" fill-opacity="0.5"/>
  <!-- ground -->
  <rect x="0" y="216" width="512" height="72" fill="#0c0800"/>
  <!-- hero figure, arms raised, on low angle (heroic low shot) -->
  <ellipse cx="256" cy="110" rx="16" ry="18" fill="#080500"/>
  <path d="M240 128 L236 215 L276 215 L272 128 Z" fill="#080500"/>
  <!-- arms raised in triumph -->
  <line x1="240" y1="140" x2="205" y2="100" stroke="#080500" stroke-width="10" stroke-linecap="round"/>
  <line x1="272" y1="140" x2="307" y2="100" stroke="#080500" stroke-width="10" stroke-linecap="round"/>
  <!-- legs -->
  <line x1="248" y1="215" x2="240" y2="262" stroke="#080500" stroke-width="11" stroke-linecap="round"/>
  <line x1="264" y1="215" x2="272" y2="262" stroke="#080500" stroke-width="11" stroke-linecap="round"/>
  <!-- rim light on figure -->
  <ellipse cx="256" cy="110" rx="18" ry="20" fill="none" stroke="#ffaa22" stroke-width="1" stroke-opacity="0.35"/>
  <!-- ground shadow -->
  <ellipse cx="256" cy="265" rx="55" ry="7" fill="#050300" fill-opacity="0.5"/>
  <!-- vignette -->
  <rect width="512" height="288" fill="url(#vig)"/>
  <!-- letterbox -->
  <rect width="512" height="20" fill="#000"/>
  <rect y="268" width="512" height="20" fill="#000"/>
  <!-- corner markers -->
  <g stroke="#fff" stroke-width="1" stroke-opacity="0.22" fill="none">
    <path d="M26 28 L26 21 L19 21"/>
    <path d="M486 28 L486 21 L493 21"/>
    <path d="M26 260 L26 267 L19 267"/>
    <path d="M486 260 L486 267 L493 267"/>
  </g>
</svg>
