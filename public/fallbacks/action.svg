<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 288">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0800"/>
      <stop offset="100%" stop-color="#2a0f04"/>
    </linearGradient>
    <radialGradient id="exp" cx="70%" cy="45%" r="35%">
      <stop offset="0%" stop-color="#ffee00" stop-opacity="0.9"/>
      <stop offset="30%" stop-color="#ff8800" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#ff2200" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.85"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="288" fill="url(#sky)"/>
  <!-- explosion glow -->
  <circle cx="358" cy="128" r="80" fill="url(#exp)" filter="url(#glow)"/>
  <!-- debris lines -->
  <line x1="358" y1="128" x2="410" y2="75" stroke="#ffcc00" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="358" y1="128" x2="435" y2="112" stroke="#ff8800" stroke-width="1" stroke-opacity="0.3"/>
  <line x1="358" y1="128" x2="420" y2="158" stroke="#ffcc00" stroke-width="1" stroke-opacity="0.35"/>
  <line x1="358" y1="128" x2="385" y2="65" stroke="#ff8800" stroke-width="1.5" stroke-opacity="0.25"/>
  <!-- ground -->
  <rect x="0" y="215" width="512" height="73" fill="#0a0400"/>
  <!-- running figure (dutch angle implied by tilt) -->
  <g transform="rotate(-8, 128, 165)">
    <ellipse cx="128" cy="128" rx="12" ry="14" fill="#0d0600"/>
    <path d="M116 142 L113 215 L143 215 L140 142 Z" fill="#0d0600"/>
    <line x1="116" y1="155" x2="88" y2="140" stroke="#0d0600" stroke-width="8" stroke-linecap="round"/>
    <line x1="140" y1="158" x2="164" y2="145" stroke="#0d0600" stroke-width="7" stroke-linecap="round"/>
    <line x1="121" y1="215" x2="108" y2="262" stroke="#0d0600" stroke-width="10" stroke-linecap="round"/>
    <line x1="135" y1="215" x2="150" y2="260" stroke="#0d0600" stroke-width="10" stroke-linecap="round"/>
  </g>
  <!-- ground shadow of figure -->
  <ellipse cx="128" cy="262" rx="45" ry="6" fill="#050200" fill-opacity="0.6"/>
  <!-- vignette -->
  <rect width="512" height="288" fill="url(#vig)"/>
  <!-- letterbox -->
  <rect width="512" height="20" fill="#000"/>
  <rect y="268" width="512" height="20" fill="#000"/>
  <!-- corner markers -->
  <g stroke="#fff" stroke-width="1" stroke-opacity="0.22" fill="none">
    <path d="M26 28 L26 21 L19 21"/>
    <path d="M486 28 L486 21 L493 21"/>
    <path d="M26 260 L26 267 L19 267"/>
    <path d="M486 260 L486 267 L493 267"/>
  </g>
</svg>
