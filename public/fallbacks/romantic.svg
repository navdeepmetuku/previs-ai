<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 288">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0810"/>
      <stop offset="100%" stop-color="#2e1018"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#ff9944" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#cc5533" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="40%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="512" height="288" fill="url(#sky)"/>
  <!-- golden-hour glow horizon -->
  <rect width="512" height="288" fill="url(#sun)"/>
  <circle cx="256" cy="250" r="130" fill="#ff8833" fill-opacity="0.18" filter="url(#glow)"/>
  <!-- horizon line -->
  <rect x="0" y="215" width="512" height="1" fill="#cc6622" fill-opacity="0.4"/>
  <!-- ground -->
  <rect x="0" y="216" width="512" height="72" fill="#0e0608"/>
  <!-- two figures, close together -->
  <!-- figure A -->
  <ellipse cx="228" cy="148" rx="11" ry="13" fill="#0a0406"/>
  <path d="M217 161 L215 215 L241 215 L239 161 Z" fill="#0a0406"/>
  <line x1="217" y1="175" x2="244" y2="185" stroke="#0a0406" stroke-width="7" stroke-linecap="round"/>
  <line x1="239" y1="177" x2="255" y2="165" stroke="#0a0406" stroke-width="7" stroke-linecap="round"/>
  <!-- figure B -->
  <ellipse cx="284" cy="150" rx="10" ry="12" fill="#0a0406"/>
  <path d="M274 162 L272 215 L296 215 L294 162 Z" fill="#0a0406"/>
  <line x1="274" y1="178" x2="257" y2="165" stroke="#0a0406" stroke-width="7" stroke-linecap="round"/>
  <line x1="294" y1="176" x2="310" y2="188" stroke="#0a0406" stroke-width="7" stroke-linecap="round"/>
  <!-- rim light lines -->
  <path d="M217 161 Q228 148 239 161" stroke="#ff9944" stroke-width="0.5" stroke-opacity="0.35" fill="none"/>
  <path d="M274 162 Q284 150 294 162" stroke="#ff9944" stroke-width="0.5" stroke-opacity="0.35" fill="none"/>
  <!-- ground shadow -->
  <ellipse cx="256" cy="262" rx="75" ry="7" fill="#060203" fill-opacity="0.5"/>
  <!-- vignette -->
  <rect width="512" height="288" fill="url(#vig)"/>
  <!-- letterbox -->
  <rect width="512" height="20" fill="#000"/>
  <rect y="268" width="512" height="20" fill="#000"/>
  <!-- corner markers -->
  <g stroke="#fff" stroke-width="1" stroke-opacity="0.22" fill="none">
    <path d="M26 28 L26 21 L19 21"/>
    <path d="M486 28 L486 21 L493 21"/>
    <path d="M26 260 L26 267 L19 267"/>
    <path d="M486 260 L486 267 L493 267"/>
  </g>
</svg>
